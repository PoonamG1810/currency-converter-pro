<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter Pro V2</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Tom Select (Searchable Dropdown) -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-btn">
        🌙 Dark Mode
    </button>

    <div class="container">

        <div class="converter-card">

            <h1>🌍 Currency Converter Pro</h1>

            <!-- Amount -->
            <div class="input-group">
                <label>Amount</label>
                <input
                    type="number"
                    id="amount"
                    placeholder="Enter amount"
                    min="0"
                >
            </div>

            <!-- From Currency -->
            <div class="currency-section">

                <div class="flag-box">
                    <img
                        id="fromFlag"
                        src="https://flagsapi.com/US/flat/64.png"
                        alt="flag">
                </div>

                <div class="currency-box">
                    <label>From Currency</label>

                    <select id="fromCurrency">
                        <!-- Loaded by JavaScript -->
                    </select>
                </div>

            </div>

            <!-- Swap -->
            <div class="swap-container">
                <button id="swapBtn" class="swap-btn">
                    ⇄
                </button>
            </div>

            <!-- To Currency -->
            <div class="currency-section">

                <div class="flag-box">
                    <img
                        id="toFlag"
                        src="https://flagsapi.com/IN/flat/64.png"
                        alt="flag">
                </div>

                <div class="currency-box">
                    <label>To Currency</label>

                    <select id="toCurrency">
                        <!-- Loaded by JavaScript -->
                    </select>
                </div>

            </div>

            <!-- Convert -->
            <button id="convertBtn" class="convert-btn">
                Convert Currency
            </button>

            <!-- Exchange Rate -->
            <div class="rate-box">
                <p id="exchangeRate">
                    Exchange Rate: --
                </p>
            </div>

            <!-- Result -->
            <div class="result-box">
                <h2 id="result">
                    Result: --
                </h2>
            </div>

        </div>
        <div class="favorites-card">

    <div class="favorites-header">
        <h2>⭐ Favorite Pairs</h2>
    </div>

    <ul id="favoritesList"></ul>

    <button id="addFavoriteBtn">
        Add Current Pair
    </button>

    </div>

        <!-- History -->
        <div class="history-card">

            <div class="history-header">

                <h2>📜 History</h2>

                <button id="clearHistoryBtn">
                    Clear
                </button>

            </div>

            <ul id="historyList"></ul>

        </div>

    </div>

    <!-- Tom Select JS -->
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

    <script src="script.js"></script>

</body>
</html>
